  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelector('.tabs button[data-tab="' + tab + '"]').classList.add('active');
    }

    // Multi-column fills top-to-bottom per column. With 5 cols and N items,
    // col1 = items[0..perCol-1], col2 = items[perCol..2*perCol-1], etc.
    // To place shirts (first 6 in DOM) across the top row visually,
    // shirt1 → pos 0 (top of col1), shirt2 → pos perCol (top of col2), etc.
    // shirt6 → pos 1 (second in col1, since only 5 columns).
    function reorderForColumns(gallery) {
      var items = Array.from(gallery.children);
      var cols = parseInt(getComputedStyle(gallery).columnCount) || 5;
      var n = items.length;
      var perCol = Math.ceil(n / cols);

      // Build the visual grid: row-by-row order we WANT to display
      // Then map to DOM order (column-by-column)
      var domOrder = new Array(n);
      var idx = 0;
      for (var row = 0; row < perCol; row++) {
        for (var col = 0; col < cols; col++) {
          var domPos = col * perCol + row;
          if (domPos < n && idx < n) {
            domOrder[domPos] = items[idx];
            idx++;
          }
        }
      }
      domOrder.forEach(function(item) { if (item) gallery.appendChild(item); });
    }

    var pics = document.getElementById('pictures');
    if (pics) reorderForColumns(pics);
  </script>
